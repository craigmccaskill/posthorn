name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'site/**'
      - 'spec/**'
      - '*.md'
      - '.github/workflows/site-deploy.yml'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'site/**'
      - 'spec/**'
      - '*.md'
      - '.github/workflows/site-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: core/go.mod

      - name: Verify modules
        run: go mod verify

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 -timeout=2m ./...
