name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'site/**'
      - 'spec/**'
      - '*.md'
      - '.github/workflows/site-deploy.yml'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'site/**'
      - 'spec/**'
      - '*.md'
      - '.github/workflows/site-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [core, caddy]
    defaults:
      run:
        working-directory: ${{ matrix.module }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: ${{ matrix.module }}/go.mod

      - name: Check for Go sources
        id: sources
        run: |
          if find . -name '*.go' | grep -q .; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No Go source files in ${{ matrix.module }} yet; skipping vet/test."
          fi

      - name: Verify modules
        run: go mod verify

      - name: Vet
        if: steps.sources.outputs.found == 'true'
        run: go vet ./...

      - name: Test
        if: steps.sources.outputs.found == 'true'
        run: go test -race -count=1 -timeout=2m ./...
